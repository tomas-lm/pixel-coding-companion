name: Feature request
description: Suggest a focused improvement.
title: '[Feature]: '
labels: ['enhancement']
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What workflow should this improve?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposal
      description: What should the app do?
    validations:
      required: true
  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - Terminal runtime
        - Projects and sessions
        - Companion UI
        - Agent preset
        - MCP
        - Distribution
        - Documentation
